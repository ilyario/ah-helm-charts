{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "static-proxy.fullname" . }}
  labels:
    {{- include "static-proxy.labels" . | nindent 4 }}
  {{- with .Values.autoscaling.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "static-proxy.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- with .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with .Values.autoscaling.resourceMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.autoscaling.podsMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.autoscaling.objectMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.autoscaling.externalMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.autoscaling.containerResourceMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.autoscaling.additionalMetrics }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
