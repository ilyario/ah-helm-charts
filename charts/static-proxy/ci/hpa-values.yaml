# CI: HPA с политикой scaleUp/scaleDown
replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  # 0 отключает CPU-метрику (with в шаблоне не рендерит 0)
  targetCPUUtilizationPercentage: 0
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
image:
  repository: nginx
  tag: "1.29"
service:
  type: ClusterIP
  port: 80
config:
  targets: []
ingress:
  host: hpa-test.local
