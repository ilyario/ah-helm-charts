{{- $common := .Values.common | default (dict) }}
{{- $cmon := $common.serviceMonitor | default (dict) }}
{{- range .Values.applications }}
{{- $amon := .serviceMonitor | default (dict) }}
{{- $sm := mergeOverwrite (deepCopy $cmon) $amon }}
{{- if and .service (default false (index $sm "enabled")) }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "citadel-common.fullname" $ }}-{{ .name }}
  labels:
    {{- include "citadel-common.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
    {{- with $sm.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $sm.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  selector:
    matchLabels:
      {{- include "citadel-common.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ .name }}
  endpoints:
    - port: {{ default (printf "http-%s" .name) (index $sm "portName") }}
      path: {{ required (printf "applications.%s: serviceMonitor.path (or common.serviceMonitor.path) is required" .name) $sm.path }}
      interval: {{ required (printf "applications.%s: serviceMonitor.interval" .name) $sm.interval }}
      scrapeTimeout: {{ required (printf "applications.%s: serviceMonitor.scrapeTimeout" .name) $sm.scrapeTimeout }}
      {{- with (index $sm "honorLabels") }}
      honorLabels: {{ . }}
      {{- end }}
      {{- with (index $sm "honorTimestamps") }}
      honorTimestamps: {{ . }}
      {{- end }}
      {{- with (index $sm "relabelings") }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (index $sm "metricRelabelings") }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (index $sm "basicAuth") }}
      basicAuth:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (index $sm "bearerTokenSecret") }}
      bearerTokenSecret:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (index $sm "scheme") }}
      scheme: {{ . }}
      {{- end }}
      {{- with (index $sm "tlsConfig") }}
      tlsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
