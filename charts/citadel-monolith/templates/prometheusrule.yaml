{{- $croot := .Values.common | default (dict) }}
{{- $cpr := $croot.prometheusRule | default (dict) }}
{{- range .Values.applications }}
{{- $apr := .prometheusRule | default (dict) }}
{{- $pr := mergeOverwrite (deepCopy $cpr) $apr }}
{{- $cdef := $cpr.defaultRules | default (dict) }}
{{- $adef := $apr.defaultRules | default (dict) }}
{{- $def := mergeOverwrite (deepCopy $cdef) $adef }}
{{- $cag := $cpr.additionalGroups | default (list) }}
{{- $aag := $apr.additionalGroups | default (list) }}
{{- $additionalGroups := concat $cag $aag }}
{{- if default false (index $pr "enabled") }}
{{- $td := $def.targetDown | default (dict) }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "citadel-common.fullname" $ }}-{{ .name }}-alerts
  labels:
    {{- include "citadel-common.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .name }}
    role: alert-rules
    {{- with (index $pr "labels") }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with (index $pr "annotations") }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
    {{- with $additionalGroups }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if ne (default true $td.enabled) false }}
    - name: {{ .name }}-http-target
      rules:
        - alert: KubeHttpTargetDown
          annotations:
            summary: "HTTP-таргет приложения «{{ .name }}» в namespace {{ $.Release.Namespace }} недоступен для скрейпинга"
            description: "Метрика up для сервиса `{{ include "citadel-common.fullname" $ }}-{{ .name }}` равна 0 (или тайм-аут) дольше порога."
          expr: |
            up{
              namespace="{{ $.Release.Namespace }}",
              service="{{ include "citadel-common.fullname" $ }}-{{ .name }}"
            } == 0
          for: {{ default "5m" $td.for }}
          labels:
            severity: {{ default "critical" $td.severity }}
            app: {{ .name | quote }}
            release: {{ $.Release.Name | quote }}
    {{- end }}
{{- end }}
{{- end }}
