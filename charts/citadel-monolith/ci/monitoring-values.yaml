# CI: ServiceMonitor + PrometheusRule (только per-app)
applications:
  - name: web
    replicaCount: 1
    image:
      repository: nginx
      tag: "1.29"
    service:
      type: ClusterIP
      port: 80
    serviceMonitor:
      enabled: true
      interval: 30s
      scrapeTimeout: 10s
      path: /metrics
      labels:
        release: prometheus
    prometheusRule:
      enabled: true
      labels:
        release: prometheus
      defaultRules:
        targetDown:
          for: 5m
          severity: critical
