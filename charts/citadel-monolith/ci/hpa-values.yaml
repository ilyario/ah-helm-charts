# CI: HPA с resource + Pods (симуляция custom metric из prometheus-adapter) + behavior
applications:
  - name: web
    replicaCount: 1
    image:
      repository: nginx
      tag: "1.29"
    service:
      type: ClusterIP
      port: 80
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      podsMetrics:
        - type: Pods
          pods:
            metric:
              name: http_requests_per_second
            target:
              type: AverageValue
              averageValue: "10"
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 60
          selectPolicy: Min
          policies:
            - type: Percent
              value: 20
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Max
          policies:
            - type: Percent
              value: 100
              periodSeconds: 15
            - type: Pods
              value: 2
              periodSeconds: 15
