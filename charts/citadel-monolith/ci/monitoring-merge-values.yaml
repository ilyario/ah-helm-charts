# CI: per-app overrides common.serviceMonitor (higher interval for api)
common:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    labels:
      release: prometheus
  prometheusRule:
    enabled: true
    labels:
      release: prometheus

applications:
  - name: web
    replicaCount: 1
    image: { repository: nginx, tag: "1.29" }
    service: { type: ClusterIP, port: 80 }
  - name: api
    replicaCount: 1
    image: { repository: nginx, tag: "1.29" }
    service: { type: ClusterIP, port: 9000 }
    serviceMonitor:
      interval: 60s
      path: /api/metrics
      portName: http-api
